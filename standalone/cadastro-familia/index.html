<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Cadastro de família — Igreja Batista Norte" />
    <meta name="robots" content="index,follow" />
    <title>Cadastro de Família — IBN</title>
    <link rel="icon" href="/favicon.ico" />
    <script>
      (function () {
        if (globalThis.__EXPO_ROUTER_HYDRATE__) {
          window.location.replace(window.location.origin + '/cadastro-familia/');
        }
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            regs.forEach(function (reg) {
              reg.unregister();
            });
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
